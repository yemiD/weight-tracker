services:
  weight-tracker:
    image: yemid/weight-tracker:latest
    ports:
      - "8001:8001"
    volumes:
      - ./weight.db:/data/weight.db
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300
    restart: unless-stopped

