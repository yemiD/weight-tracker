version: '3.8'

services:
  app:
    image: yemid/weight-tracker:latest
    ports:
      - "8001:8001"
    volumes:
      - weight_data:/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300
    restart: unless-stopped

volumes:
  weight_data:
